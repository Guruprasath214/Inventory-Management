openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Smart Inventory Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product inventory operations
  - name: notifications
    description: Notification center operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      description: Returns all products, optionally filtered by low stock
      parameters:
        - name: lowStock
          in: query
          required: false
          schema:
            type: boolean
          description: If true, return only products with stock < 5
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name or product-code
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/stats:
    get:
      operationId: getInventoryStats
      tags: [products]
      summary: Get inventory statistics
      description: Returns dashboard-level stats including totals, low stock counts, and category breakdown
      responses:
        "200":
          description: Inventory statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryStats"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/stock:
    patch:
      operationId: updateStock
      tags: [products]
      summary: Update product stock quantity
      description: Updates the stock quantity. Rejects negative results. Handles concurrent updates safely.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdate"
      responses:
        "200":
          description: Updated product with new stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error or negative stock prevented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List active notifications
      description: Returns active stock notifications with per-user read state.
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
          description: If true, return only unread notifications for the current user.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum notifications to return.
        - name: x-user-id
          in: header
          required: false
          schema:
            type: string
          description: Optional logical user id for read receipt isolation. Defaults to admin.
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark selected notifications as read
      parameters:
        - name: x-user-id
          in: header
          required: false
          schema:
            type: string
          description: Optional logical user id for read receipt isolation. Defaults to admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationsReadRequest"
      responses:
        "200":
          description: Number of notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadAck"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all active notifications as read
      parameters:
        - name: x-user-id
          in: header
          required: false
          schema:
            type: string
          description: Optional logical user id for read receipt isolation. Defaults to admin.
      responses:
        "200":
          description: Number of notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationReadAck"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required: [id, name, sku, category, price, quantity, lowStockThreshold, isLowStock, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        price:
          type: number
          description: Price in Indian Rupees (INR)
        quantity:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, sku, category, price, quantity]
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
          description: Price in Indian Rupees (INR)
        quantity:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0
          default: 5

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        category:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0

    StockUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          description: New absolute stock quantity (must be >= 0)
          minimum: 0

    InventoryStats:
      type: object
      required: [totalProducts, totalValue, lowStockCount, outOfStockCount, categories]
      properties:
        totalProducts:
          type: integer
        totalValue:
          type: number
          description: Total value in Indian Rupees (INR)
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"

    CategoryStat:
      type: object
      required: [category, count, totalValue]
      properties:
        category:
          type: string
        count:
          type: integer
        totalValue:
          type: number
          description: Total value in Indian Rupees (INR)

    Notification:
      type: object
      required: [id, productId, eventType, severity, title, message, isRead, createdAt, updatedAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        eventType:
          type: string
        severity:
          type: string
          enum: [warning, critical]
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        readAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MarkNotificationsReadRequest:
      type: object
      required: [notificationIds]
      properties:
        notificationIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: integer

    NotificationReadAck:
      type: object
      required: [updated]
      properties:
        updated:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
